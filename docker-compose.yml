version: "3.7"
services:
  slm-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slm-backend
    restart: always
    ports:
      - "8007:8000"
    volumes:
      - /home/data/models:/root/.cache/huggingface
      - ./uploads:/app/uploads
      - ./vector_db:/app/vector_db
      - ./adapters:/app/adapters
      - ./chroma_db_final:/app/chroma_db_final
      - ./data:/app/data
    environment:
      - TRANSFORMERS_OFFLINE=0
      - HF_DATASETS_OFFLINE=0
      - MINIO_API_HOST=192.168.1.10:9000
      - ACCESS_KEY=minio
      - SECRET_KEY=password
      - NODE_STORAGE_REF=nodes_bucket
      # ── Auto-load adapter on startup ──────────────────────────────
      - DEFAULT_MODEL=tinyllama
      - DEFAULT_ADAPTER_PATH=adapters/derma_v1.0
      - DEFAULT_ADAPTER_MODE=derma
